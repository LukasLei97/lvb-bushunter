<!DOCTYPE html>
<html lang="de">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🚌 BusHunter Leipzig</title>

    <meta name="theme-color" content="#0f172a">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="app-header">

    <h1>🚌 BusHunter Leipzig</h1>

    <p id="welcomeText">Willkommen 👋</p>

</header>

<main>

    <section id="homePage">

        <section class="card dashboardCard">

            <h2>📊 Dashboard</h2>

            <div class="progressWrapper">

                <div class="progress-bar">

                    <div id="progress"></div>

                </div>

                <p id="progressText">0 % abgeschlossen</p>

            </div>

            <div class="dashboardGrid">

                <div class="dashboardStat">

                    <div class="bigNumber" id="gesamt">0</div>

                    <small>🚌 Fahrzeuge</small>

                </div>

                <div class="dashboardStat">

                    <div class="bigNumber" id="gefahren">0</div>

                    <small>✅ Gefahren</small>

                </div>

                <div class="dashboardStat">

                    <div class="bigNumber" id="offen">0</div>

                    <small>⬜ Offen</small>

                </div>

            </div>

        </section>

        <section class="card">

            <input
                id="search"
                type="text"
                placeholder="🔍 Fahrzeug oder Typ suchen...">

        </section>

<section class="card">

    <details id="typeStatsDetails">

        <summary>📈 Fahrzeugtypen</summary>

        <div id="typeStats"></div>

    </details>

</section>

        <section class="card">

            <h2>🚍 Fahrzeuge</h2>

            <div id="vehicleList"></div>

        </section>

    </section>

    <section id="statsPage" hidden>

        <div class="card">

            <h2>📊 Statistik</h2>

            <div id="statsContent">
                Wird geladen...
            </div>

        </div>

    </section>

    <section id="rankingPage" hidden>

        <div class="card">

            <h2>🏆 Rangliste</h2>

            <div id="rankingList">
                Wird geladen...
            </div>

        </div>

    </section>

    <section id="settingsPage" hidden>

        <div class="card">

            <h2>⚙️ Einstellungen</h2>

            <div class="settingsList">

                <div class="settingItem">
                    <strong>👤 Aktueller Fahrer</strong>
                    <p id="currentPlayer">Nicht angemeldet</p>
                </div>

                <div class="settingItem">
                    <strong>📱 Version</strong>
                    <p>BusHunter 4.2</p>
                </div>

                <button id="logoutButton">
                    🔄 Fahrer wechseln
                </button>

                <div id="adminArea"></div>

            </div>

        </div>

    </section>

</main>

<nav class="bottom-nav">

    <button id="navHome" class="active">
        🏠
        <span>Start</span>
    </button>

    <button id="navStats">
        📊
        <span>Statistik</span>
    </button>

    <button id="navRanking">
        🏆
        <span>Rangliste</span>
    </button>

    <button id="navSettings">
        ⚙️
        <span>Einstellungen</span>
    </button>

</nav>

<script type="module" src="js/app.js"></script>

</body>
</html>
