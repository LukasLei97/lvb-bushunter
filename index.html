<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚌 BusHunter Leipzig</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#0f172a">
</head>
<body>

<header>
    <h1>🚌 BusHunter Leipzig</h1>
    <p>Alle Fahrzeuge sammeln</p>
</header>

<main>

    <section class="card">

        <h2>📊 Übersicht</h2>

        <div class="stats">

            <div class="stat">
                <span id="gesamt">0</span>
                <small>Fahrzeuge</small>
            </div>

            <div class="stat">
                <span id="gefahren">0</span>
                <small>Gefahren</small>
            </div>

            <div class="stat">
                <span id="offen">0</span>
                <small>Offen</small>
            </div>

        </div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <p id="progressText">0 % abgeschlossen</p>

    </section>

    <section class="card">

        <input
            type="text"
            id="search"
            placeholder="🔍 Fahrzeug oder Typ suchen...">

    </section>

    <section class="card">
        <div id="vehicleList"></div>
    </section>

</main>

<script src="app.js"></script>

</body>
</html>
