<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚌 BusHunter Leipzig</title>

    <meta name="theme-color" content="#0f172a">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="app-header">

    <h1>🚌 BusHunter Leipzig</h1>

    <p id="welcomeText">
        Willkommen zurück 👋
    </p>

</header>

<main>

    <!-- START -->
    <section id="homePage">

        <section class="card">

            <h2>📊 Übersicht</h2>

            <div class="progress-bar">
                <div id="progress"></div>
            </div>

            <p id="progressText">0 % abgeschlossen</p>

            <div class="stats">

                <div class="stat">
                    <span id="gesamt">0</span>
                    <small>Fahrzeuge</small>
                </div>

                <div class="stat">
                    <span id="gefahren">0</span>
                    <small>Gefahren</small>
                </div>

                <div class="stat">
                    <span id="offen">0</span>
                    <small>Offen</small>
                </div>

            </div>

        </section>

        <section class="card">

            <input
                id="search"
                type="text"
                placeholder="🔍 Fahrzeug suchen">

        </section>

        <section class="card">

            <h2>📈 Fahrzeugtypen</h2>

            <div id="typeStats"></div>

        </section>

        <section class="card">

            <div id="vehicleList"></div>

        </section>

    </section>

    <!-- STATISTIK -->

    <section id="statsPage" hidden>

        <div class="card">

            <h2>📊 Statistik</h2>

            <p>Diese Seite bekommt Diagramme und Auswertungen.</p>

        </div>

    </section>

    <!-- RANGLISTE -->

    <section id="rankingPage" hidden>

        <div class="card">

            <h2>🏆 Rangliste</h2>

            <p>Noch nicht eingerichtet.</p>

        </div>

    </section>

    <!-- EINSTELLUNGEN -->

    <section id="settingsPage" hidden>

        <div class="card">

            <h2>⚙️ Einstellungen</h2>

            <p>Kommt in Version 3.1.</p>

        </div>

    </section>

</main>

<nav class="bottom-nav">

    <button id="navHome" class="active">
        🏠
        <span>Start</span>
    </button>

    <button id="navStats">
        📊
        <span>Statistik</span>
    </button>

    <button id="navRanking">
        🏆
        <span>Rangliste</span>
    </button>

    <button id="navSettings">
        ⚙️
        <span>Einstellungen</span>
    </button>

</nav>

<script type="module" src="js/app.js"></script>

</body>
</html>
